apiVersion: agent.smol.ai/v1alpha1
kind: AgentOCIFileSystem
metadata:
  name: demo-agent-state
spec:
  baseImage: cgr.dev/chainguard/static:latest
  stateRef: registry.example.com/acme/demo-agent-state
  branch: main
  mountMode: auto
  registrySecretRef:
    name: osix-registry-auth
  signing:
    signer: keyless
    attestation: slsa
    certificateIdentity: https://github.com/smol-platform/smol-agent-oci-fs/.github/workflows/release.yml@refs/heads/main
    certificateOIDCIssuer: https://token.actions.githubusercontent.com
  snapshotPolicyRef:
    name: frequent-checkpoint
  runtimeClassRef:
    name: linux-overlay
