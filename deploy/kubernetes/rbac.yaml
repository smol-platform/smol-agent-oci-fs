apiVersion: v1
kind: Namespace
metadata:
  name: osix-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osix-operator
  namespace: osix-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: osix-operator
rules:
  - apiGroups: ["agent.smol.ai"]
    resources:
      - agentocifilesystems
      - agentocisnapshotpolicies
      - agentocisnapshots
      - agentociruntimeclasses
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["agent.smol.ai"]
    resources:
      - agentocifilesystems/status
      - agentocisnapshotpolicies/status
      - agentocisnapshots/status
      - agentociruntimeclasses/status
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources:
      - events
      - secrets
      - persistentvolumes
      - persistentvolumeclaims
      - pods
      - nodes
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - csinodes
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: osix-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: osix-operator
subjects:
  - kind: ServiceAccount
    name: osix-operator
    namespace: osix-system
