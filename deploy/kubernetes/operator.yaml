apiVersion: apps/v1
kind: Deployment
metadata:
  name: osix-operator
  namespace: osix-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: osix-operator
      app.kubernetes.io/part-of: smol-agent-oci-fs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: osix-operator
        app.kubernetes.io/part-of: smol-agent-oci-fs
    spec:
      serviceAccountName: osix-operator
      containers:
        - name: operator
          image: ghcr.io/smol-platform/smol-agent-oci-fs-operator:latest
          imagePullPolicy: IfNotPresent
          args: ["serve", "--addr", ":8080"]
          ports:
            - containerPort: 8080
              name: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
