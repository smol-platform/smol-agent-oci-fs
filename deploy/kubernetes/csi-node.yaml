apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: osix-csi-node
  namespace: osix-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: osix-csi-node
      app.kubernetes.io/part-of: smol-agent-oci-fs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: osix-csi-node
        app.kubernetes.io/part-of: smol-agent-oci-fs
    spec:
      serviceAccountName: osix-operator
      containers:
        - name: node
          image: ghcr.io/smol-platform/smol-agent-oci-fs-csi:latest
          imagePullPolicy: IfNotPresent
          args:
            - serve-csi
            - --endpoint
            - unix:///csi/csi.sock
            - --workspace-root
            - /var/lib/osix
            - --enable-workers
            - --metrics-addr
            - :9809
          ports:
            - containerPort: 9809
              name: metrics
          securityContext:
            privileged: true
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: kubelet
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: osix-workspaces
              mountPath: /var/lib/osix
            - name: dev-fuse
              mountPath: /dev/fuse
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.11.1
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/osix.agent.smol.ai/csi.sock
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          image: registry.k8s.io/sig-storage/livenessprobe:v2.13.1
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=/csi/csi.sock
            - --health-port=9808
          ports:
            - containerPort: 9808
              name: healthz
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
      volumes:
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/osix.agent.smol.ai
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: kubelet
          hostPath:
            path: /var/lib/kubelet
        - name: osix-workspaces
          hostPath:
            path: /var/lib/osix
            type: DirectoryOrCreate
        - name: dev-fuse
          hostPath:
            path: /dev/fuse
            type: CharDevice
