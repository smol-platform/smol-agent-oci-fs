apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentocifilesystems.agent.smol.ai
spec:
  group: agent.smol.ai
  scope: Namespaced
  names:
    plural: agentocifilesystems
    singular: agentocifilesystem
    kind: AgentOCIFileSystem
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [baseImage, stateRef]
              properties:
                baseImage:
                  type: string
                stateRef:
                  type: string
                branch:
                  type: string
                sourceRef:
                  type: string
                mountMode:
                  type: string
                  enum: [auto, overlay, fuse, materialized]
                registrySecretRef:
                  type: object
                  properties:
                    name:
                      type: string
                encryption:
                  type: object
                  properties:
                    recipients:
                      type: string
                    secretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                signing:
                  type: object
                  properties:
                    signer:
                      type: string
                    attestation:
                      type: string
                    trustedKeySecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                    identityTokenSecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                snapshotPolicyRef:
                  type: object
                  properties:
                    name:
                      type: string
                runtimeClassRef:
                  type: object
                  properties:
                    name:
                      type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
