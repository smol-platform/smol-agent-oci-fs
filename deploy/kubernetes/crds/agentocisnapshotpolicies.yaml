apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentocisnapshotpolicies.agent.smol.ai
spec:
  group: agent.smol.ai
  scope: Namespaced
  names:
    plural: agentocisnapshotpolicies
    singular: agentocisnapshotpolicy
    kind: AgentOCISnapshotPolicy
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                every:
                  type: string
                maxDirtyBytes:
                  type: string
                onTurnBoundary:
                  type: boolean
                push:
                  type: boolean
                compactEvery:
                  type: integer
                squashEvery:
                  type: integer
                checkpointTagPrefix:
                  type: string
                keepSnapshots:
                  type: array
                  items:
                    type: string
                preserveSigned:
                  type: boolean
                pruneLocal:
                  type: boolean
                pruneRemote:
                  type: boolean
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
