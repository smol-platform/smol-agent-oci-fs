name: Images

on:
  pull_request:
    paths:
      - Dockerfile.csi
      - Dockerfile.operator
      - cmd/**
      - internal/**
      - go.mod
      - go.sum
      - .github/workflows/images.yml
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Optional image tag to publish in addition to generated tags
        required: false
        type: string
      push_images:
        description: Push images to GHCR
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  HAS_GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' }}

jobs:
  build:
    name: Build ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: operator
            dockerfile: Dockerfile.operator
            image: smol-agent-oci-fs-operator
          - component: csi
            dockerfile: Dockerfile.csi
            image: smol-agent-oci-fs-csi
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide push mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          push=false
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            push=true
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ inputs.push_images }}" = "true" ]; then
            push=true
          fi
          if [ "${push}" = "true" ] && [ "${HAS_GHCR_TOKEN}" != "true" ]; then
            echo "::notice::GHCR_TOKEN is not configured; building images without pushing"
            push=false
          fi
          echo "push=${push}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        if: steps.mode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.mode.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
